<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ficha Paranormal RPG</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="background-overlay"></div>

<div class="container">

  <!-- TOPO -->
  <header class="topo">
    <div class="titulo-box">
      <h1>FICHA PARANORMAL</h1>
      <p>Sistema de RPG Paranormal</p>
    </div>

    <div class="nivel-box">
      <label>Nível</label>
      <input type="number" id="nivel" value="1" min="1">
    </div>
  </header>

  <!-- STATUS -->
  <section class="status-grid">

    <div class="status-card vida">
      <h2>PV</h2>

      <div class="status-linha">
        <input type="number" id="pvAtual" value="0">
        <span>/</span>
        <input type="number" id="pvMax" value="0">
      </div>
    </div>

    <div class="status-card sanidade">
      <h2>PD</h2>

      <div class="status-linha">
        <input type="number" id="pdAtual" value="0">
        <span>/</span>
        <input type="number" id="pdMax" value="0">
      </div>
    </div>

    <div class="status-card esforco">
      <h2>PA</h2>

      <div class="status-linha">
        <input type="number" id="paAtual" value="0">
        <span>/</span>
        <input type="number" id="paMax" value="3">
      </div>
    </div>

  </section>

  <!-- ATRIBUTOS -->
  <section class="bloco">
    <h2 class="titulo-secao">ATRIBUTOS</h2>

    <div class="atributos-grid">

      <div class="atributo">
        <label>FOR</label>
        <input type="number" id="for">
      </div>

      <div class="atributo">
        <label>AGI</label>
        <input type="number" id="agi">
      </div>

      <div class="atributo">
        <label>INT</label>
        <input type="number" id="int">
      </div>

      <div class="atributo">
        <label>VIG</label>
        <input type="number" id="vig">
      </div>

      <div class="atributo">
        <label>PRE</label>
        <input type="number" id="pre">
      </div>

    </div>
  </section>

  <!-- PERÍCIAS -->
  <section class="bloco">
    <div class="secao-topo">
      <h2 class="titulo-secao">PERÍCIAS</h2>

      <button class="btn-add" onclick="adicionarPericia()">
        +
      </button>
    </div>

    <div id="listaPericias"></div>
  </section>

  <!-- ASSIMILAÇÕES -->
  <section class="bloco">
    <div class="secao-topo">
      <h2 class="titulo-secao">ASSIMILAÇÕES</h2>

      <button class="btn-add" onclick="adicionarAssimilacao()">
        +
      </button>
    </div>

    <div id="listaAssimilacoes"></div>
  </section>

  <!-- CONDIÇÕES -->
  <section class="bloco">
    <div class="secao-topo">
      <h2 class="titulo-secao">CONDIÇÕES</h2>

      <button class="btn-add" onclick="abrirModalCondicoes()">
        +
      </button>
    </div>

    <div id="listaCondicoes"></div>
  </section>

  <!-- INVENTÁRIO -->
  <section class="bloco inventario-bloco">

    <div class="secao-topo">
      <h2 class="titulo-secao">INVENTÁRIO</h2>

      <button class="btn-add" onclick="abrirModalItens()">
        +
      </button>
    </div>

    <div id="inventarioLista"></div>

  </section>

</div>

<!-- MODAL ITENS -->
<div class="modal hidden" id="modalItens">

  <div class="modal-content">

    <div class="modal-topo">
      <h2>Adicionar Item</h2>

      <button class="fechar-btn" onclick="fecharModalItens()">
        ✕
      </button>
    </div>

    <input
      type="text"
      id="pesquisaItem"
      placeholder="Pesquisar item..."
      onkeyup="filtrarItens()"
      class="pesquisa"
    >

    <div id="listaItensModal" class="lista-modal"></div>

  </div>
</div>

<!-- MODAL CONDIÇÕES -->
<div class="modal hidden" id="modalCondicoes">

  <div class="modal-content">

    <div class="modal-topo">
      <h2>Adicionar Condição</h2>

      <button class="fechar-btn" onclick="fecharModalCondicoes()">
        ✕
      </button>
    </div>

    <div id="listaCondicoesModal" class="lista-modal"></div>

  </div>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
