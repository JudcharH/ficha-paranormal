<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema RPG Paranormal</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <header>
      <h1>Sistema RPG Paranormal</h1>
    </header>

    <main>

      <section class="ficha">
        <h2>Ficha</h2>

        <div class="status-grid">
          <div>
            <label>PV Atual</label>
            <input type="number" id="pvAtual" value="40" />
          </div>

          <div>
            <label>PV Máximo</label>
            <input type="number" id="pvMax" value="40" />
          </div>

          <div>
            <label>PD Atual</label>
            <input type="number" id="pdAtual" value="20" />
          </div>

          <div>
            <label>PD Máximo</label>
            <input type="number" id="pdMax" value="20" />
          </div>
        </div>

        <h3>Condições</h3>

        <div class="condicoes-box">
          <select id="condicaoSelect"></select>
          <button onclick="adicionarCondicao()">Adicionar</button>
        </div>

        <div id="listaCondicoes"></div>
      </section>

      <section class="inventario-area">
        <div class="inventario-topo">
          <h2>Inventário</h2>
          <button id="abrirModal">+</button>
        </div>

        <div id="inventarioLista"></div>
      </section>

    </main>

  </div>

  <div class="modal" id="modalItens">
    <div class="modal-conteudo">

      <div class="modal-topo">
        <h2>Adicionar Item</h2>
        <button onclick="fecharModal()">X</button>
      </div>
